<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>paint invest</title>
<style>
  :root { --bg: #F6F7F9; --ink: #1F2328; --muted: #9CA3AF; --line: #E5E7EB; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Thai', sans-serif;
  }
  .wrap {
    max-width: 640px; margin: 0 auto;
    padding: calc(8px + env(safe-area-inset-top)) 8px calc(80px + env(safe-area-inset-bottom));
  }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  /* จอกว้าง (คอม): 10 คอลัมน์ต่อแถว */
  @media (min-width: 700px) {
    .wrap { max-width: 1180px; }
    .grid { grid-template-columns: repeat(10, 1fr); }
  }
  .tile {
    aspect-ratio: 1/1; border: none; border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; padding: 4px; overflow: hidden; font-family: inherit;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08); transition: transform .08s ease;
    container-type: inline-size;
  }
  .tile:active { transform: scale(0.95); }
  .tile .tk {
    font-weight: 800; font-size: clamp(11px, 22cqw, 20px); letter-spacing: .2px;
    line-height: 1.1; white-space: nowrap;
  }
  .tile .l2 {
    line-height: 1.15; text-align: center; word-break: break-word;
    font-variant-numeric: tabular-nums;
  }
  .tile .l2.dca { font-size: clamp(10px, 17cqw, 14px); font-weight: 700; opacity: .95; }
  .tile .l2.dca.zero { opacity: .55; }
  .tile .l2.note { font-size: clamp(8px, 13cqw, 12px); font-weight: 500; opacity: .95; }
  .msg { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
  .err {
    background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C;
    border-radius: 12px; padding: 12px 14px; font-size: 13px; margin: 6px 4px;
  }
  .err button {
    border: none; background: transparent; color: #B91C1C; font-weight: 700;
    text-decoration: underline; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  #refresh {
    position: fixed; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom));
    width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line);
    background: rgba(255,255,255,.92); backdrop-filter: blur(6px);
    color: var(--ink); font-size: 20px; cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.12); z-index: 40;
  }
  #refresh:active { transform: scale(.92); }
  #refresh.spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* detail sheet */
  #overlay {
    position: fixed; inset: 0; background: rgba(15,18,24,.45); z-index: 50;
    display: none; align-items: flex-end; justify-content: center;
  }
  #overlay.show { display: flex; }
  #sheet {
    width: 100%; max-width: 560px; background: #fff; border-radius: 18px 18px 0 0;
    padding: 20px 20px calc(28px + env(safe-area-inset-bottom));
    box-shadow: 0 -8px 30px rgba(0,0,0,.18);
  }
  .d-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .d-chip { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
  .d-tk { font-weight: 800; font-size: 20px; }
  .d-note { font-size: 13px; color: #6B7280; }
  .d-price { font-weight: 800; font-size: 20px; font-variant-numeric: tabular-nums; margin-left: auto; text-align: right; }
  .d-src { font-size: 10.5px; font-weight: 500; color: #9CA3AF; }
  .zrow {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; border-radius: 8px; background: #F4F5F7; color: #374151;
    font-weight: 500; font-size: 14px; margin-bottom: 6px;
  }
  .zrow span:last-child { font-variant-numeric: tabular-nums; }
  .zrow.on { font-weight: 700; }
  .zextra { padding: 8px 12px; border-radius: 8px; font-weight: 700; font-size: 14px; text-align: center; color: #fff; margin-bottom: 6px; }
  .zhint { padding: 6px 12px; font-size: 12.5px; color: #6B7280; text-align: center; }
</style>
</head>
<body>
<div class="wrap"><div id="grid-area"></div></div>
<button id="refresh" aria-label="refresh">↻</button>
<div id="overlay"><div id="sheet"></div></div>

<script>
const PUB_BASE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_Ov-ZcBPZuMoXbqGJ8g0Q3yt3MyZXtxZ95jugQU-GFPTNA4RrnQSjRBm6lEZBZY74u3y77oYsJILT/pub";
const FINNHUB_KEY = "d8vk65pr01qgrv4p0h90d8vk65pr01qgrv4p0h9g";
const QUOTE_COOLDOWN_MS = 60 * 1000; // กัน rate limit: ดึง Finnhub ชุดใหม่ได้ทุก 60 วิ
const AUTO_REFRESH_MS = 90 * 1000;   // ราคาวิ่งเองทุก 90 วิ (เฉพาะตอนหน้า active)

// scheme "standard" (Growth): 6 band, เพดานแดง = watch×1.2
// scheme "deep" (UnderDog/Future): 7 band, ดำต่ำกว่า deep×0.75, ส้ม scout→scout×1.02, แดงเกิน scout×1.02
// scheme "none" (Buy Red): ไม่มีสีโซน แสดงแค่ ticker + 👀 (ราคา ≤ row 8) + note
// noZoneFrom: หุ้นลำดับที่ N เป็นต้นไปใน tab นั้น บังคับใช้ scheme "none"
const TABS = [
  { id:"growth",   label:"Growth",   gid:"105420029",  zones:["watch","target","strong","review"], line2:"dca",  scheme:"standard" },
  { id:"underdog", label:"UnderDog", gid:"1001789567", zones:["scout","build","load","deep"],      line2:"note", scheme:"deep", noZoneFrom:11 },
  { id:"future",   label:"Future",   gid:"1405580845", zones:["scout","build","load","deep"],      line2:"note", scheme:"deep" },
  { id:"buyred",   label:"Buy Red",  gid:"763891677",  zones:["scout","build","load","deep"],      line2:"note", scheme:"none" },
];

const COLORS = {
  black:{bg:"#434343",fg:"#fff"},  purple:{bg:"#674ea7",fg:"#fff"},
  blue:{bg:"#4c7be8",fg:"#fff"},   green:{bg:"#9bbb59",fg:"#fff"},
  yellow:{bg:"#fbbc04",fg:"#fff"}, orange:{bg:"#ff6d01",fg:"#fff"},
  plain:{bg:"#EFEFEF",fg:"#1F2328"}, red:{bg:"#ea4335",fg:"#fff"},
};

// band(c, [r4,r5,r6,r7]) คืน index ของสีใน palette (null = ข้อมูลไม่ครบ)
// thBand(i) = band ที่ threshold row i (0=r4 .. 3=r7) เป็นเพดาน (ใช้ highlight ใน detail)
const SCHEMES = {
  standard: {
    palette:["purple","blue","green","yellow","plain","red"],
    band(c,[r4,r5,r6,r7]){
      if(c==null||[r4,r5,r6,r7].some(x=>x==null)) return null;
      if(c<=r7) return 0; if(c<=r6) return 1; if(c<=r5) return 2;
      if(c<=r4) return 3; if(c<=r4*1.2) return 4; return 5;
    },
    thBand(i){ return 3-i; },
    extras(idx,t,zones){
      if(idx===5) return {type:"extra", color:"red", text:"เกิน +20% จาก "+zones[0]+" ("+fmtPrice(t[0]*1.2)+")"};
      if(idx===4) return {type:"hint", text:"อยู่เหนือ "+zones[0]+" แต่ยังไม่เกิน +20% ("+fmtPrice(t[0]*1.2)+")"};
      return null;
    },
  },
  deep: {
    palette:["black","purple","blue","green","yellow","orange","red"],
    band(c,[r4,r5,r6,r7]){
      if(c==null||[r4,r5,r6,r7].some(x=>x==null)) return null;
      if(c<=r7*0.75) return 0; if(c<=r7) return 1; if(c<=r6) return 2;
      if(c<=r5) return 3; if(c<=r4) return 4; if(c<=r4*1.02) return 5; return 6;
    },
    thBand(i){ return 4-i; },
    extras(idx,t,zones){
      if(idx===6) return {type:"extra", color:"red", text:"เกิน "+zones[0]+" +2% ("+fmtPrice(t[0]*1.02)+")"};
      if(idx===5) return {type:"extra", color:"orange", text:"ใกล้ "+zones[0]+" (ไม่เกิน "+fmtPrice(t[0]*1.02)+")"};
      if(idx===0) return {type:"extra", color:"black", text:"ต่ำกว่า "+zones[3]+" −25% ("+fmtPrice(t[3]*0.75)+")"};
      return null;
    },
  },
  none: {
    hideZones: true,
    palette:["plain"],
    band(){ return null; },   // null -> สีเทาอ่อนเสมอ
    thBand(){ return -1; },
    extras(){ return null; },
  },
};

const state = { data:{}, quotes:{}, lastQuoteFetch:0 };

function parseCSV(text){
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{
      if(ch==='"') q=true;
      else if(ch===","){ row.push(cur); cur=""; }
      else if(ch==="\n"){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(ch!=="\r") cur+=ch;
    }
  }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function parseNum(s){
  if(s==null) return null;
  const c=String(s).replace(/[$,฿\s]/g,"");
  if(c==="") return null;
  const n=parseFloat(c);
  return Number.isFinite(n)?n:null;
}
// รับเฉพาะตัวเลขล้วน (ปฏิเสธ "193 / $15", "JUL" ฯลฯ) สำหรับเงื่อนไข eyes
function parseStrictNum(s){
  if(s==null) return null;
  const c=String(s).trim().replace(/[$,฿\s]/g,"");
  if(c==="") return null;
  if(!/^-?\d*\.?\d+$/.test(c)) return null;
  const n=parseFloat(c);
  return Number.isFinite(n)?n:null;
}
function extractStocks(rows){
  if(!rows||rows.length<3) return [];
  const out=[]; const width=Math.max(...rows.slice(0,8).map(r=>r.length));
  for(let col=1;col<width;col++){
    const ticker=(rows[0]&&rows[0][col]||"").trim();
    if(!ticker) continue;
    out.push({
      ticker,
      symbol:ticker.replace(/\*/g,"").trim().toUpperCase(),
      note:(rows[1]&&rows[1][col]||"").trim(),
      sheetPrice:parseNum(rows[2]&&rows[2][col]),
      t:[parseNum(rows[3]&&rows[3][col]),parseNum(rows[4]&&rows[4][col]),
         parseNum(rows[5]&&rows[5][col]),parseNum(rows[6]&&rows[6][col])],
      row8:parseStrictNum(rows[7]&&rows[7][col]),
    });
  }
  return out;
}
function priceOf(s){
  const q=state.quotes[s.symbol];
  if(q!=null) return {value:q, live:true};
  return {value:s.sheetPrice, live:false};
}
// scheme ของหุ้นตัวนั้น (อาจถูก override เป็น "none" ด้วย noZoneFrom)
function schemeFor(s,tab){ return SCHEMES[s.scheme||tab.scheme]; }
function colorFor(s,tab){
  const sch=schemeFor(s,tab);
  const i=sch.band(priceOf(s).value,s.t);
  return i==null?COLORS.plain:COLORS[sch.palette[i]];
}
function fmtPrice(n){
  if(n==null) return "—";
  return n>=1000 ? "$"+n.toLocaleString("en-US",{maximumFractionDigits:2}) : "$"+n.toFixed(2);
}
function esc(s){ return s.replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

async function loadTab(tab){
  try{
    const url=PUB_BASE+"?gid="+tab.gid+"&single=true&output=csv&cachebust="+Date.now();
    const res=await fetch(url,{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const text=await res.text();
    if(text.trim().startsWith("<")) throw new Error("ได้ HTML แทน CSV — เช็คว่า publish เป็น CSV แล้ว");
    const stocks=extractStocks(parseCSV(text));
    if(!stocks.length) throw new Error("ไม่พบข้อมูลหุ้น");
    stocks.forEach((s,i)=>{
      s.scheme = (tab.noZoneFrom && (i+1)>=tab.noZoneFrom) ? "none" : tab.scheme;
    });
    state.data[tab.id]={stocks};
  }catch(e){
    state.data[tab.id]={...(state.data[tab.id]||{}), error:e.message||"โหลดไม่สำเร็จ"};
  }
}

async function fetchQuote(symbol){
  try{
    const res=await fetch("https://finnhub.io/api/v1/quote?symbol="+encodeURIComponent(symbol)+"&token="+FINNHUB_KEY);
    if(!res.ok) return;
    const j=await res.json();
    if(j&&typeof j.c==="number"&&j.c>0) state.quotes[symbol]=j.c;
  }catch(e){ /* fallback ราคา Sheet */ }
}

async function fetchAllQuotes(){
  const now=Date.now();
  if(now-state.lastQuoteFetch<QUOTE_COOLDOWN_MS) return;
  state.lastQuoteFetch=now;
  const symbols=new Set();
  TABS.forEach(tab=>{
    const d=state.data[tab.id]||{};
    (d.stocks||[]).forEach(s=>symbols.add(s.symbol));
  });
  await Promise.all([...symbols].map(fetchQuote));
}

async function loadAll(){
  const btn=document.getElementById("refresh");
  btn.classList.add("spin");
  if(!TABS.some(t=>(state.data[t.id]||{}).stocks)){
    document.getElementById("grid-area").innerHTML='<div class="msg">กำลังดึงข้อมูล...</div>';
  }
  await Promise.all(TABS.map(loadTab));
  render();
  await fetchAllQuotes();
  render();
  btn.classList.remove("spin");
}

function render(){
  const area=document.getElementById("grid-area");
  area.innerHTML="";
  TABS.forEach(tab=>{
    const d=state.data[tab.id]||{};
    if(d.error&&!d.stocks){
      const div=document.createElement("div");
      div.className="err";
      div.innerHTML='โหลด '+tab.label+' ไม่สำเร็จ: '+esc(d.error)+' ';
      const b=document.createElement("button");
      b.textContent="ลองใหม่";
      b.onclick=()=>{ loadTab(tab).then(render); };
      div.appendChild(b);
      area.appendChild(div);
    }
  });
  const grid=document.createElement("div");
  grid.className="grid";
  TABS.forEach(tab=>{
    const d=state.data[tab.id]||{};
    if(!d.stocks) return;
    d.stocks.forEach(s=>{
      const c=colorFor(s,tab);
      const btn=document.createElement("button");
      btn.className="tile";
      btn.style.background=c.bg; btn.style.color=c.fg;
      let l2="";
      if(s.note!==""){
        const cls = tab.line2==="dca" ? ("dca"+(s.note==="0"?" zero":"")) : "note";
        l2='<div class="l2 '+cls+'">'+esc(s.note)+'</div>';
      }
      const eyes = (s.row8!=null && priceOf(s).value <= s.row8) ? " 👀" : "";
      btn.innerHTML='<div class="tk">'+esc(s.ticker)+eyes+'</div>'+l2;
      btn.onclick=()=>openDetail(s,tab);
      grid.appendChild(btn);
    });
  });
  if(grid.children.length) area.appendChild(grid);
}

function openDetail(s,tab){
  const sch=schemeFor(s,tab);
  const c=colorFor(s,tab);
  const p=priceOf(s);
  const idx=sch.band(p.value,s.t);
  let rows="";
  if(!sch.hideZones){
    s.t.forEach((th,i)=>{
      const band=sch.thBand(i);
      const on=idx!=null&&idx===band;
      const bc=COLORS[sch.palette[band]];
      rows+='<div class="zrow'+(on?" on":"")+'"'+(on?' style="background:'+bc.bg+';color:'+bc.fg+'"':'')+'>'
          +'<span style="text-transform:capitalize">'+tab.zones[i]+'</span><span>'+fmtPrice(th)+'</span></div>';
    });
  }
  let extra="";
  const ex=idx!=null?sch.extras(idx,s.t,tab.zones):null;
  if(ex){
    if(ex.type==="extra") extra='<div class="zextra" style="background:'+COLORS[ex.color].bg+'">'+ex.text+'</div>';
    else extra='<div class="zhint">'+ex.text+'</div>';
  }
  if(sch.hideZones && s.row8!=null){
    extra+='<div class="zhint">👀 ที่ '+fmtPrice(s.row8)+'</div>';
  }
  const noteLine = s.note ? '<div class="d-note">'+(tab.line2==="dca"?"DCA เดือนนี้: ฿":"")+esc(s.note)+'</div>' : "";
  const eyes = (s.row8!=null && p.value <= s.row8) ? " 👀" : "";
  document.getElementById("sheet").innerHTML=
    '<div class="d-head"><div class="d-chip" style="background:'+c.bg+'"></div>'
    +'<div><div class="d-tk">'+esc(s.ticker)+eyes+'</div>'+noteLine+'</div>'
    +'<div class="d-price">'+fmtPrice(p.value)
    +'<div class="d-src">'+(p.live?"● ราคาสด (Finnhub)":"ราคาจาก Sheet (~20 นาที)")+'</div></div></div>'
    +rows+extra;
  document.getElementById("overlay").classList.add("show");
}
document.getElementById("overlay").onclick=function(e){
  if(e.target===this) this.classList.remove("show");
};
document.getElementById("refresh").onclick=loadAll;

// auto-refresh ราคา: วิ่งเองเมื่อหน้า active และครบรอบเวลา
async function autoTick(){
  if(document.visibilityState!=="visible") return;
  if(Date.now()-state.lastQuoteFetch<AUTO_REFRESH_MS) return;
  const btn=document.getElementById("refresh");
  btn.classList.add("spin");
  await fetchAllQuotes();
  render();
  btn.classList.remove("spin");
}
setInterval(autoTick, 15*1000);
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible") autoTick();
});

loadAll();
</script>
</body>
</html>
